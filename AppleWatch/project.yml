name: RecallWatch

options:
  bundleIdPrefix: com.recall
  deploymentTarget:
    watchOS: "26.0"
  xcodeVersion: "26"
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: 4
    WATCHOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""

configs:
  Debug: debug
  Release: release

targets:
  RecallWatch:
    type: application
    platform: watchOS
    sources:
      - path: RecallWatch
        excludes:
          - "Preview Content"
      - path: Shared
      - path: RecallWatchIntents
        excludes:
          - "Info.plist"
    resources:
      - path: RecallWatch/Resources
      - path: RecallWatch/Preview Content
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recall.watch
        INFOPLIST_FILE: RecallWatch/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: RecallWatch/Resources/RecallWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: RecallWatch/Resources/RecallWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.recall.shared
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    info:
      path: RecallWatch/Resources/Info.plist
      properties:
        CFBundleDisplayName: Recall
        WKApplication: true
        UIBackgroundModes:
          - audio
          - location
          - workout-processing
        NSMicrophoneUsageDescription: "音声の継続録音にマイクを使用します"
        NSLocationAlwaysAndWhenInUseUsageDescription: "バックグラウンドでの位置情報追跡に使用します"
        NSLocationWhenInUseUsageDescription: "位置情報の記録に使用します"
        NSHealthShareUsageDescription: "歩数・心拍数・睡眠などのヘルスデータを記録します"
        NSMotionUsageDescription: "歩行・走行・移動手段などのアクティビティを検出します"
        NSAppTransportSecurity:
          NSExceptionDomains:
            ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    dependencies:
      - target: RecallWatchComplication

  RecallWatchComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: RecallWatchComplication
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recall.watch.complication
        INFOPLIST_FILE: RecallWatchComplication/Info.plist
    info:
      path: RecallWatchComplication/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  RecallWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: Tests/RecallWatchTests
    dependencies:
      - target: RecallWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recall.watch.tests
